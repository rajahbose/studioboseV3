<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Studio BOSE Admin</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --bg-2: #111;
      --bg-3: #161616;
      --bg-4: #1c1c1c;
      --border: #242424;
      --text: #e2ddd6;
      --text-muted: #a8a49e;
      --accent: #c8a96e;
    }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 2rem; }
    .container { max-width: 1000px; margin: 0 auto; }
    
    .nav-logo { display:flex; align-items:center; gap:10px; margin-right: auto; user-select: none; }
    .nav-logo-img { height:28px; width:28px; object-fit:contain; opacity:.85; }
    .nav-logo-wordmark { font-weight:500; font-size:16px; letter-spacing:.04em; color:var(--text); white-space:nowrap; }
    .nav-logo-wordmark .pipe { color:var(--accent); margin:0 1px; font-weight:300; }

    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; position: sticky; top: 0; background: rgba(10,10,10,0.85); backdrop-filter: blur(8px); padding: 1rem 0; border-bottom: 1px solid var(--border); z-index: 10; margin-top:-2rem; padding-top: 2rem;}
    
    .project-card { border: 1px solid var(--border); padding: 2rem; border-radius: 6px; background: var(--bg-2); }
    label { display: block; font-weight: 500; margin-bottom: 0.35rem; margin-top: 1.25rem; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
    input, textarea, select { width: 100%; padding: 0.6rem 0.75rem; border: 1px solid var(--border); border-radius: 4px; box-sizing: border-box; background: var(--bg-3); color: var(--text); font-family: inherit; transition: border-color 0.2s; font-size: 0.95rem; }
    input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); }
    
    button { background: var(--bg-4); color: var(--text); border: 1px solid var(--border); padding: 0.6rem 1rem; border-radius: 4px; cursor: pointer; transition: all 0.2s; font-weight: 500; }
    button:hover { background: var(--border); }
    button.btn-primary { background: var(--accent); color: #000; border: none; font-weight: 600; box-shadow: 0 4px 12px rgba(200,169,110,0.1); }
    button.btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 6px 16px rgba(200,169,110,0.25); background: var(--accent); }
    button.btn-danger { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
    button.btn-danger:hover { background: #ef4444; color: #fff; }
    
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .img-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .img-item { display: flex; gap: 0.5rem; }
    
    .selector-bar { display: flex; gap: 1.5rem; align-items: center; background: var(--bg-2); padding: 1.25rem 2rem; border-radius: 6px; margin-bottom: 1.5rem; border: 1px solid var(--border); }
  </style>
</head>
<body>
  <div id="app" class="container">
    <div class="top-bar">
      <div class="nav-logo">
        <img class="nav-logo-img" src="../images/logo.png" alt="studio|BOSE">
        <span class="nav-logo-wordmark">studio<span class="pipe">|</span>BOSE</span>
        <span style="font-size: 11px; margin-left: 12px; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase;">Admin Manager</span>
      </div>
      <button class="btn-primary" @click="saveProjects" style="padding: 0.75rem 2rem; font-size: 1rem;">Save All Changes</button>
    </div>
    
    <div v-if="loading" style="padding: 3rem; text-align: center; color: var(--text-muted)">Loading projects...</div>
    <div v-else>
      <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem; background: var(--bg-2); padding: 1.5rem 2rem; border-radius: 6px; border: 1px solid var(--border);">
        <div style="flex: 1; display: flex; flex-direction: column; gap: 1.5rem;">
          <div v-for="cat in ['residential', 'commercial', 'creative']" :key="cat">
            <h4 style="margin: 0 0 0.75rem 0; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.15em; color: var(--text-muted);">{{ cat }}</h4>
            <div style="display: flex; flex-wrap: wrap; gap: 0.5rem;">
              <button 
                v-for="(p, i) in projects.filter(proj => proj.category === cat)" 
                :key="p.id"
                @click="selectedProjectIdx = projects.indexOf(p)"
                :style="{ background: projects.indexOf(p) === selectedProjectIdx ? 'var(--accent)' : 'var(--bg-3)', color: projects.indexOf(p) === selectedProjectIdx ? '#000' : 'var(--text)', border: '1px solid ' + (projects.indexOf(p) === selectedProjectIdx ? 'var(--accent)' : 'var(--border)'), padding: '0.5rem 1rem', borderRadius: '4px', cursor: 'pointer', fontWeight: projects.indexOf(p) === selectedProjectIdx ? '600' : '400', transition: 'all 0.2s', fontSize: '0.9rem' }"
              >
                {{ p.title || 'Untitled' }}
              </button>
            </div>
          </div>
        </div>
        <!-- <button @click="addProject" style="white-space:nowrap; padding: 0.7rem 1.2rem; margin-left: 2rem;">+ Add New Entry</button> -->
      </div>

      <div v-if="projects.length > 0 && projects[selectedProjectIdx]" class="project-card">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 1.5rem; margin-bottom: 0.5rem;">
          <h2 style="margin: 0; font-size: 1.75rem; font-weight: 300; letter-spacing: -0.02em;">{{ projects[selectedProjectIdx].title || 'Untitled Project' }}</h2>
          <!-- <button class="btn-danger" @click="removeProject(selectedProjectIdx)">Delete Project</button> -->
        </div>
        
        <div class="grid-2">
          <div>
            <label>Title</label>
            <input v-model="projects[selectedProjectIdx].title" placeholder="Project Title" />
          </div>
          <div>
            <label>Subtitle / Excerpt</label>
            <input v-model="projects[selectedProjectIdx].subtitle" placeholder="Short description" />
          </div>
        </div>

        <div class="grid-2">
          <div>
            <label>Category</label>
            <select v-model="projects[selectedProjectIdx].category">
              <option value="commercial">Commercial</option>
              <option value="residential">Residential</option>
              <option value="creative">Creative</option>
            </select>
          </div>
          <div>
            <label>Year</label>
            <input v-model="projects[selectedProjectIdx].year" />
          </div>
        </div>

        <div class="grid-2">
          <div>
            <label>Location</label>
            <input v-model="projects[selectedProjectIdx].location" />
          </div>
          <div>
            <label>Client</label>
            <input v-model="projects[selectedProjectIdx].client" />
          </div>
        </div>
        
        <div class="grid-2">
          <div>
            <label>Status</label>
            <input v-model="projects[selectedProjectIdx].status" />
          </div>
          <div>
            <label>Area</label>
            <input v-model="projects[selectedProjectIdx].area" />
          </div>
        </div>

        <div>
          <label>Materials</label>
          <input v-model="projects[selectedProjectIdx].materials" placeholder="e.g., Stucco, Steel, Adobe" />
        </div>

        <div class="grid-2">
          <div>
            <label>Description Paragraph 1</label>
            <textarea v-model="projects[selectedProjectIdx].desc1" rows="5"></textarea>
          </div>
          <div>
            <label>Description Paragraph 2</label>
            <textarea v-model="projects[selectedProjectIdx].desc2" rows="5"></textarea>
          </div>
        </div>

        <div>
          <label>Images Array (URLs starting with images/projects/...)</label>
          <div class="img-list">
            <div v-for="(img, imgIdx) in projects[selectedProjectIdx].imgs" :key="imgIdx" class="img-item" style="align-items: center; background: var(--bg-3); padding: 0.5rem; border-radius: 4px;">
              <img v-if="img" :src="'../' + img" style="width: 80px; height: 80px; object-fit: cover; border-radius: 4px; border: 1px solid var(--border);" />
              <div v-else style="width: 80px; height: 80px; background: var(--bg-4); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: var(--text-muted); text-align: center;">Empty</div>
              <input v-model="projects[selectedProjectIdx].imgs[imgIdx]" placeholder="images/projects/folder/image.jpg" style="flex: 1;" />
              <button class="btn-danger" @click="projects[selectedProjectIdx].imgs.splice(imgIdx, 1)">X</button>
            </div>
            <button style="margin-top:0.5rem; width: 160px; font-size: 0.85rem; padding: 0.4rem;" @click="projects[selectedProjectIdx].imgs = projects[selectedProjectIdx].imgs || []; projects[selectedProjectIdx].imgs.push('')">+ Add Image Url</button>
          </div>
        </div>
      </div>
      <div v-else style="text-align: center; padding: 4rem; color: var(--text-muted); background: var(--bg-2); border-radius: 6px; border: 1px dashed var(--border);">
        No projects exist. Click "+ Add New Entry" above to create one.
      </div>
    </div>
  </div>

  <script src="../projects.js"></script>
  <script>
    const { createApp, ref, onMounted } = Vue;

    createApp({
      setup() {
        const loading = ref(true);
        const projectsData = ref([]);
        const selectedProjectIdx = ref(0);

        onMounted(() => {
          if (typeof projects !== 'undefined') {
            projectsData.value = JSON.parse(JSON.stringify(projects));
          }
          loading.value = false;
        });

        const saveProjects = async () => {
          try {
            const res = await fetch('/api/save-projects', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(projectsData.value)
            });
            const result = await res.json();
            if (result.success) {
              alert('Successfully saved. You can verify it locally and push to GitHub.');
            } else {
              alert('Error saving projects.');
            }
          } catch (e) {
            console.error(e);
            alert('Error network request failed');
          }
        };

        const addProject = () => {
          projectsData.value.unshift({
            id: 'new-project-' + Date.now(),
            number: '00X',
            title: 'New Project',
            subtitle: '',
            category: 'commercial',
            year: new Date().getFullYear().toString(),
            location: '',
            area: '',
            client: '',
            status: '',
            materials: '',
            colors: ['ph-a', 'ph-b', 'ph-c'],
            desc1: '',
            desc2: '',
            statement: '',
            imgs: []
          });
          selectedProjectIdx.value = 0; // Select the newly added project
        };

        const removeProject = (idx) => {
          if(confirm('Are you sure you want to delete this project?')) {
            projectsData.value.splice(idx, 1);
            if(selectedProjectIdx.value >= projectsData.value.length) {
              selectedProjectIdx.value = Math.max(0, projectsData.value.length - 1);
            }
          }
        };

        return {
          projects: projectsData,
          selectedProjectIdx,
          loading,
          saveProjects,
          addProject,
          removeProject
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
